<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Vizora💎</title>
</head>
<body>
    <table>
        <tr>
            <td><h1>Vizora💎</h1></td>
        </tr>
    </table>
    <div>
        <h2>Generate Your Image</h2>
        <p>Describe the image you'd like to create in detail.<br> The more specific your description, the better the results will be.
        </p>
    </div>

    
    <div class="promptArea"> 
        <input type="text" name="promt" id="prompt" placeholder="Type here...">
    </div>


    <div class="select-container">

             <select name="width" id="widthIMG">
                    <option selected value="0">Choose the width</option>
                    <option value="512">512</option>
                    <option value="768">768</option>
                    <option value="1024">1024</option>
                    <option value="1080">1080</option>
                </select>
            </td>
            <td>
                <select name="height" id="heightIMG">
                    <option selected value="01">Choose the height</option>
                    <option value="512">512</option>
                    <option value="768">768</option>
                    <option value="1024">1024</option>
                    <option value="1080">1080</option>
                </select>
     </div>        

     <span class="loader" id="loader" style="display: none;"></span>

    <button id="genarate" onclick="getPrompt()">
        Genarate🎨    </button>

        <div class="imageBackdrop" id="imageBackdrop">
            <div class="imageHolder">
                <img src="" id="ImageResalts" onload="document.getElementById('loder').style.display='none';document.getElementById('imageBackdrop').style.display='block'" alt="">
                <div class="closeBt" onclick="document.getElementById('imageBackdrop').style.display='none'">X</div>
                <div class="downloadBt" onclick="window.open(url, '_blank');" id="downloadBtn" >Download</div>
            </div>
            
        </div>
        <div class="imageBackdrop" id="loder">
           <img src="https://cdn.pixabay.com/animation/2022/07/29/03/42/03-42-11-849_512.gif" class="mainLoder" alt="">            
        </div>
        <canvas id="hiddenCanvas" style="display: none;"></canvas>

    <script src="main.js"></script>
</body>
</html>
